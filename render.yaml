services:
  - type: web
    name: command-center-api
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: command-center-db
          property: connectionString

databases:
  - name: command-center-db
    databaseName: command_center
    user: jon
